{% extends "core/base_logged_in.html" %}

{% block content %}
<div class="container mt-5">
  <h2>Attendance Sheet Manager</h2>

  <form method="post" id="attendanceForm">
    {% csrf_token %}

    <!-- Timetable selection -->
    <div class="mb-3">
      <label for="timetableSelect" class="form-label"><strong>Select Timetable:</strong></label>
      <select id="timetableSelect" name="timetable" class="form-select" required>
        <option value="">-- Select Timetable --</option>
        {% for tt in timetables %}
          <option value="{{ tt.id }}" {% if selected_timetable and selected_timetable.id == tt.id %}selected{% endif %}>
            {{ tt.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <!-- Show phases and weeks only after timetable selection -->
    <div id="phaseWeekContainer" style="display:none;">

      <!-- Phase selection -->
      <div class="mb-3">
        <label class="form-label"><strong>Select Phase(s):</strong></label><br />
        {% for phase in phases %}
          <div class="form-check form-check-inline">
            <input class="form-check-input phase-checkbox" type="checkbox" id="phase_{{ phase }}" name="phases" value="{{ phase }}">
            <label class="form-check-label" for="phase_{{ phase }}">{{ phase }}</label>
          </div>
        {% endfor %}
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="phase_all" name="phases" value="All">
          <label class="form-check-label" for="phase_all">All</label>
        </div>
      </div>

      <!-- Weeks selection -->
      <div class="mb-3" id="weeksContainer" style="display:none;">
        <label class="form-label"><strong>Select Week(s):</strong></label>
        <div id="weeksList">
          <!-- Weeks checkboxes dynamically inserted here -->
        </div>
      </div>
    </div>

    <!-- Hidden input to carry phone number for WhatsApp sending -->
    <input type="hidden" name="phone_number" id="phoneNumberInput" value="">

    <button type="submit" name="action" value="download" class="btn btn-primary">Generate & Download Excel</button>

    <button type="button" id="sendWhatsappBtn" class="btn btn-success">Send on WhatsApp</button>
  </form>
</div>

<script>
  const weekMap = {{ week_map|safe }};
  const phases = {{ phases|safe }};
  const timetableSelect = document.getElementById('timetableSelect');
  const phaseWeekContainer = document.getElementById('phaseWeekContainer');

  // Show/hide phase/week container based on timetable selection
  function showPhaseWeekContainer(show) {
    phaseWeekContainer.style.display = show ? 'block' : 'none';
  }

  timetableSelect.addEventListener('change', function() {
    showPhaseWeekContainer(this.value !== '');
  });

  document.addEventListener('DOMContentLoaded', function() {
    showPhaseWeekContainer(timetableSelect.value !== '');
    updateWeeksSelection();
  });

  function getWeekLabel(weekDates, phase) {
    if (!weekDates.length) return '';
    const start = new Date(weekDates[0]);
    const end = new Date(weekDates[weekDates.length - 1]);
    return `${phase} Week: ${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;
  }

  function updateWeeksSelection() {
    const selectedPhases = Array.from(document.querySelectorAll('.phase-checkbox:checked')).map(cb => cb.value);
    const weeksList = document.getElementById('weeksList');
    weeksList.innerHTML = '';

    if (selectedPhases.length === 0 || selectedPhases.includes('All')) {
      phases.forEach(phase => {
        if (weekMap[phase]) {
          weekMap[phase].forEach((weekDates, index) => {
            const label = getWeekLabel(weekDates, phase);
            const id = `week_${phase}_${index}`;
            weeksList.insertAdjacentHTML('beforeend', `
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="weeks" value="${index}" id="${id}">
                <label class="form-check-label" for="${id}">${label}</label>
              </div>
            `);
          });
        }
      });
      document.getElementById('weeksContainer').style.display = 'block';
    } else {
      selectedPhases.forEach(phase => {
        if (weekMap[phase]) {
          weekMap[phase].forEach((weekDates, index) => {
            const label = getWeekLabel(weekDates, phase);
            const id = `week_${phase}_${index}`;
            weeksList.insertAdjacentHTML('beforeend', `
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="weeks" value="${index}" id="${id}">
                <label class="form-check-label" for="${id}">${label}</label>
              </div>
            `);
          });
        }
      });
      document.getElementById('weeksContainer').style.display = 'block';
    }
  }

  document.querySelectorAll('.phase-checkbox').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) {
        document.getElementById('phase_all').checked = false;
      }
      updateWeeksSelection();
    });
  });

  document.getElementById('phase_all').addEventListener('change', function() {
    if (this.checked) {
      document.querySelectorAll('.phase-checkbox').forEach(cb => cb.checked = false);
    }
    updateWeeksSelection();
  });

  // Handle Send on WhatsApp button click
  document.getElementById('sendWhatsappBtn').addEventListener('click', function() {
    // Ask for phone number input
    const phoneNumber = prompt("Enter WhatsApp number with country code (no '+'), e.g. 919876543210:");
    if (!phoneNumber) {
      alert("Phone number is required to send on WhatsApp.");
      return;
    }
    
    // Set hidden input to phone number
    document.getElementById('phoneNumberInput').value = phoneNumber.trim();

    // Set hidden action input to "whatsapp"
    const form = document.getElementById('attendanceForm');
    let actionInput = form.querySelector('input[name="action"]');
    if (!actionInput) {
      actionInput = document.createElement('input');
      actionInput.type = 'hidden';
      actionInput.name = 'action';
      form.appendChild(actionInput);
    }
    actionInput.value = 'whatsapp';

    // Submit the form
    form.submit();
  });
</script>
{% endblock %}
