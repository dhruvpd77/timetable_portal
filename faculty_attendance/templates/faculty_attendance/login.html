{% load static %}

{% block content %}

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faculty Attendance Login</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Your custom ERP CSS -->
  <link rel="stylesheet" href="{% static 'css/erp_styles.css' %}" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: #f4f7fb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #2c3e50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      border-radius: 1rem;
      box-shadow: 0 0.75rem 1.5rem rgba(44, 62, 80, 0.15);
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      max-width: 850px;
      width: 100%;
    }
    .login-image {
      width: 46%;
      background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=550&q=80') no-repeat center center/cover;
      min-height: 465px;
      display: none;
    }
    .login-card-body {
      flex: 1;
      padding: 2.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-title {
      font-weight: 700;
      font-size: 1.7rem;
      color: #34495e;
      margin-bottom: 1.3rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .form-label, label {
      font-weight: 600;
      color: #2980b9;
    }
    .form-control, .form-select {
      border-radius: 0.5rem;
      border: 1.5px solid #bcd8f5;
      background-color: #f3f8fc;
      color: #35516a;
      font-weight: 500;
    }
    .form-select option {
      color: #34495e;
    }
    .form-control:focus, 
    .form-select:focus {
      border-color: #53b2fc;
      background-color: #fff;
      box-shadow: 0 0 0 0.18rem rgba(76,175,255,.10);
      outline: none;
    }
    .btn-primary {
      background: #3483eb;
      border: none;
      font-weight: 700;
      padding: 0.6rem;
      border-radius: 0.5rem;
      box-shadow: 0 0.25rem 0.5rem rgba(80,142,236,0.12);
      transition: background 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .btn-primary:hover, .btn-primary:focus {
      background: #2462b9;
    }
    .create-user-link {
      font-weight: 600;
      color: #3483eb;
      transition: color 0.3s;
      text-decoration: underline;
    }
    .create-user-link:hover {
      color: #1abc9c;
      text-decoration: none;
    }
    .login-footer {
      text-align: center;
      font-weight: 500;
      color: #7f8c8d;
      font-size: 0.95rem;
      padding-top: 1rem;
    }
    @media (min-width: 768px) {
      .login-image {
        display: block;
      }
    }
    @media (max-width: 900px) {
      .login-card {
        flex-direction: column;
        max-width: 95vw;
      }
      .login-image {
        width: 100%;
        min-height: 180px;
        display: block;
      }
      .login-card-body {
        padding: 2rem 1rem;
      }
    }
  </style>
</head>
<body>
   <div class="container" style="max-width: 850px;">
    <div class="d-flex justify-content-end mb-2">
      <a href="{% url 'welcome' %}" class="btn btn-primary btn-sm">Back to Main Page</a>
    </div>
    
  <div class="login-card">
    <div class="login-image"></div>
    <div class="login-card-body">
      <h3 class="card-title">Faculty Attendance Login</h3>
      <form method="post" novalidate style="color: #2c3e50;">
        {% csrf_token %}
        <!-- College -->
        <div class="mb-3">
          <label for="id_college" class="form-label">College:</label>
          <select id="id_college" name="college" class="form-select" required>
            <option value="" disabled selected>Select College</option>
            {% for c in form.fields.college.queryset %}
              <option value="{{ c.id }}" {% if form.initial.college == c.id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        <!-- Department -->
        <div class="mb-3">
          <label for="id_department" class="form-label">Department:</label>
          <select id="id_department" name="department" class="form-select" required>
            <option value="" disabled selected>Select Department</option>
            {% for d in form.fields.department.queryset %}
              <option value="{{ d.id }}" {% if form.initial.department == d.id %}selected{% endif %}>{{ d.name }}</option>
            {% endfor %}
          </select>
        </div>
        <!-- Username -->
        <div class="mb-3">
          <label for="id_username" class="form-label">Faculty Username:</label>
          <input type="text" name="username" id="id_username" class="form-control"
                 placeholder="Enter your username" required />
        </div>
        <!-- Password -->
        <div class="mb-4">
          <label for="id_password" class="form-label">Password:</label>
          <input type="password" name="password" id="id_password" class="form-control"
                 placeholder="Enter your password" required />
        </div>
        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div class="login-footer mt-2">
        <span>Don't have an account?</span>
        <a href="{% url 'faculty_attendance:create_faculty_user' %}" class="create-user-link ms-2">Create Faculty User</a>
      </div>
    </div>
  </div>
  <script>
    $(document).ready(function(){
      $('#id_college').change(function(){
        var collegeId = $(this).val();
        $.ajax({
          url: "{% url 'faculty_attendance:ajax_load_departments' %}",
          data: {'college_id': collegeId},
          success: function(data) {
            $("#id_department").html('<option value="" disabled selected>Select Department</option>');
            $.each(data, function(key, value) {
              $("#id_department").append('<option value="' + value.id + '">' + value.name + '</option>');
            });
          }
        });
      });
    });
  </script>
</body>
</html>
{% endblock %}
