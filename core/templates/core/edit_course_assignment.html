{% extends "core/base_logged_in.html" %}
{% load static %}
{% block content %}
<div class="container mt-4">
    <h3>Edit Course Assignment</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'assign_course' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
