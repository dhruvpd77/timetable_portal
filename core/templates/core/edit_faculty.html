{% extends 'core/base_logged_in.html' %}
{% load static %}
{% block title %}Edit Faculty{% endblock %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/erp_styles.css' %}">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3>Edit Faculty</h3>
  <a href="{% url 'faculty_management' %}" class="btn btn-outline-secondary">← Back</a>
</div>

<form method="post" class="card shadow p-4">
  {% csrf_token %}
  <div class="row mb-3">
    <div class="col-md-6">
      <label>Full Name</label>
      <input type="text" name="full_name" class="form-control" value="{{ faculty.full_name }}" required>
    </div>
    <div class="col-md-3">
      <label>Short Name</label>
      <input type="text" name="short_name" class="form-control" value="{{ faculty.short_name }}" required>
    </div>
    <div class="col-md-3">
      <label>Default Load</label>
      <input type="number" name="default_load" class="form-control" value="{{ faculty.default_load }}" required>
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
</form>

{% endblock %}
